<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiver — QMD</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-J4QG6T5TE5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-J4QG6T5TE5');
  </script>

  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<nav>
  <a href="/" class="brand">QMD</a>
  <a href="/about.html">About</a>
  <a href="/browse.html">Browse</a>
  <a href="/search.html">Search</a>
  <a href="/roadmap.html">Roadmap</a>
  <div class="spacer"></div>
  <span class="status" id="api-status">connecting…</span>
</nav>

<div class="page" id="page-content">
  <div class="state-msg"><div class="spinner"></div>Loading quiver…</div>
</div>

<script>
const API = 'postgresql://quivermutationdb_user:ABdWjraWZHhH0qrl2pxVXNiVElEVai9s@dpg-d6orue24d50c739aqi00-a.virginia-postgres.render.com/quivermutationdb';
const qid = new URLSearchParams(location.search).get('id');

function renderMatrix(matrix) {
  const n = matrix.length;
  const grid = document.createElement('div');
  grid.className = 'matrix-grid';
  grid.style.gridTemplateColumns = `repeat(${n}, auto)`;
  matrix.forEach(row => row.forEach(val => {
    const cell = document.createElement('div');
    cell.className = 'matrix-cell ' + (val > 0 ? 'positive' : val < 0 ? 'negative' : 'zero');
    cell.textContent = val;
    grid.appendChild(cell);
  }));
  const wrap = document.createElement('div');
  wrap.className = 'matrix-container';
  wrap.innerHTML = '<span class="matrix-bracket">[</span>';
  wrap.appendChild(grid);
  wrap.innerHTML += '<span class="matrix-bracket">]</span>';
  wrap.querySelector('.matrix-grid') && wrap.insertBefore(grid, wrap.lastChild);
  // rebuild properly
  wrap.innerHTML = '';
  const lb = document.createElement('span'); lb.className = 'matrix-bracket'; lb.textContent = '[';
  const rb = document.createElement('span'); rb.className = 'matrix-bracket'; rb.textContent = ']';
  wrap.appendChild(lb); wrap.appendChild(grid); wrap.appendChild(rb);
  return wrap;
}

function renderPage(q) {
  document.title = `${q.qmd_id} — QMD`;
  const n = q.exchange_matrix.length;
  const isOpen = q.is_open;
  const dynkin = q.dynkin_type ?? '—';

  const content = document.getElementById('page-content');
  content.innerHTML = `
    <div class="breadcrumb">
      <a href="/browse.html">Browse</a>
      <span>/</span>
      <span>${q.qmd_id}</span>
    </div>

    <div class="title-block">
      <div class="qid">${q.qmd_id}</div>
      <h1>${q.label ?? ('Rank-' + n + ' Quiver')}</h1>
      <span class="badge ${isOpen ? 'badge-open' : 'badge-closed'}">
        ${isOpen ? 'Open class' : 'Finite type'}
      </span>
    </div>

    <div class="two-col">
      <div class="section" id="matrix-section">
        <div class="section-label">Exchange matrix</div>
      </div>
      <div class="section">
        <div class="section-label">Properties</div>
        <div class="meta-list">
          <div class="meta-row"><span class="key">Rank</span><span class="val">${n}</span></div>
          <div class="meta-row"><span class="key">Dynkin type</span><span class="val">${dynkin}</span></div>
          <div class="meta-row"><span class="key">Acyclic</span><span class="val">${q.is_acyclic ?? '—'}</span></div>
          <div class="meta-row"><span class="key">Connected</span><span class="val">${q.is_connected ?? '—'}</span></div>
          <div class="meta-row"><span class="key">Max edge weight</span><span class="val">${q.max_edge ?? '—'}</span></div>
          <div class="meta-row">
            <span class="key">Mutation class</span>
            <span class="val">
              <a href="/class.html?id=${encodeURIComponent(q.mc_id)}">${q.mc_id}</a>
            </span>
          </div>
          <div class="meta-row"><span class="key">Orbit size</span><span class="val">${q.class_size ?? (isOpen ? '∞' : '—')}</span></div>
        </div>
      </div>
    </div>

    <div class="section section-full">
      <div class="section-label">Tags</div>
      <div class="tags" id="tags-container">
        ${(q.tags ?? []).length === 0
          ? '<span style="color:var(--ink-light);font-style:italic;font-size:0.88rem">No tags</span>'
          : (q.tags ?? []).map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
    </div>

    <div class="section section-full">
      <div class="section-label">
        Other labeled quivers in this mutation class
        ${q.class_size ? `<span style="font-weight:400;opacity:0.6"> — ${q.class_size} total</span>` : ''}
      </div>
      <div id="class-members-container">
        <div class="state-msg" style="padding:2rem">
          <div class="spinner"></div>Loading class members…
        </div>
      </div>
    </div>
  `;

  // Insert the matrix
  const matrixSection = document.getElementById('matrix-section');
  matrixSection.appendChild(renderMatrix(q.exchange_matrix));

  // Load class members
  fetchClassMembers(q.mc_id, q.qmd_id);
}

async function fetchClassMembers(mcId, currentQid) {
  try {
    const res = await fetch(`${API}/classes/${encodeURIComponent(mcId)}`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    renderClassMembers(data.labeled_quivers, currentQid, data.canonical_qid);
  } catch {
    // Demo: show a few synthetic rows
    const rows = Array.from({length: 6}, (_, i) => ({
      qmd_id: i === 0 ? currentQid : `Q.n3.${(0xabc123 + i * 0x1f).toString(16).padEnd(16,'0')}`,
      is_canonical: i === 2,
    }));
    renderClassMembers(rows, currentQid, rows[2].qmd_id);
  }
}

function renderClassMembers(members, currentQid, canonicalQid) {
  const container = document.getElementById('class-members-container');
  if (!members || members.length === 0) {
    container.innerHTML = '<p style="padding:1rem;color:var(--ink-light);font-style:italic">No members found.</p>';
    return;
  }
  const rows = members.map(m => {
    const isCurrent = m.qmd_id === currentQid;
    const isCanon = m.qmd_id === canonicalQid;
    return `<tr class="${isCanon ? 'canon-row' : ''}">
      <td>${isCurrent
        ? `<span style="font-family:var(--mono);font-size:0.72rem">${m.qmd_id} <span style="color:var(--ink-light)">(current)</span></span>`
        : `<a href="/quiver.html?id=${encodeURIComponent(m.qmd_id)}">${m.qmd_id}</a>`}
      </td>
      <td class="mono">${isCanon ? '★ canonical rep' : ''}</td>
    </tr>`;
  }).join('');
  container.innerHTML = `
    <table class="members-table">
      <thead><tr><th>Quiver ID</th><th>Notes</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${members.length > 10 ? `<p style="padding:0.75rem;font-family:var(--mono);font-size:0.72rem;color:var(--ink-light)">Showing all ${members.length} labeled matrices.</p>` : ''}
  `;
}

async function fetchQuiver(id) {
  try {
    const res = await fetch(`${API}/quivers/${encodeURIComponent(id)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    document.getElementById('api-status').textContent = 'connected';
    return await res.json();
  } catch {
    document.getElementById('api-status').textContent = 'demo mode';
    // Demo quiver
    return {
      qmd_id: id,
      label: 'A3',
      num_vertices: 3,
      exchange_matrix: [[0,1,0],[-1,0,1],[0,-1,0]],
      dynkin_type: 'A3',
      is_finite_type: true,
      is_open: false,
      is_acyclic: true,
      is_connected: true,
      max_edge: 1,
      class_size: 14,
      mc_id: 'MC.n3.8b4942ccbfd5b5aa',
      tags: ['acyclic', 'simply-laced', 'cluster-finite'],
    };
  }
}

if (!qid) {
  document.getElementById('page-content').innerHTML =
    '<div class="state-msg">No quiver ID specified. <a href="/browse.html" style="color:var(--accent)">Browse all quivers →</a></div>';
} else {
  fetchQuiver(qid).then(renderPage);
}
</script>
<footer>
  <span>Quiver Mutation Database (QMD)</span>
  <span><a href="mailto:blake.jackson@uconn.edu">blake.jackson@uconn.edu</a></span>
</footer>

</body>
</html>
